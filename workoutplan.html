<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Workout Builder</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo">LOGO</div>

        <ul>

          <li><a href="#">Plans</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>

      <div class="signin">

    <section class="hero">

   <section class="plans">

      <button>View Plan</button>
    </a>
  </div>

  <!-- Weight Loss -->
  <div class="plan-card">
    <h2>Weight Loss</h2>
    <img src="assets/weightloss.jpg" alt="Weight Loss Plan" />

      <button>View Plan</button>
    </a>
  </div>

  <div class="plan-card">
    <h2>Muscle Gain</h2>
    <img src="assets/musclegain.jpg" alt="Muscle Gain Plan" />

    <a href="musclegain.html">
      <button>View Plan</button>
    </a>
  </div>

</section>

    <!-- Motivation -->
    <section class="motivation">
      <h3>Always stay happy and healthy</h3>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <h3>Footer</h3>
      <p>© 2025 Workout Builder • Stay Fit • Stay Strong</p>
    </footer>

  </div>

  <script src="script.js"></script>

</html>

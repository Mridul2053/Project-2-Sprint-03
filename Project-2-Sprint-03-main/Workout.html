<!DOCTYPE html>
<html>
<head>
  <title>Workout Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Workout Builder</h2>

<input id="exercise" placeholder="Exercise">
<input id="sets" placeholder="Sets">
<input id="reps" placeholder="Reps">

<button onclick="addWorkout()">Add</button>

<ul id="list"></ul>

<script>
function addWorkout(){
  const li = document.createElement("li");
  li.textContent = `${exercise.value} - ${sets.value}x${reps.value}`;
  list.appendChild(li);
}
</script>

</body>
</html>

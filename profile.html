<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FitTracker — Profile</title>
  <link rel="stylesheet" href="profile.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="assets/logo.png" alt="FitTracker Logo" class="brand-logo">
      <span>FitTracker</span>
    </div>

    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="tracker.html">Nutrition</a>
      <a href="Workout.html">Workout</a>
      <a href="profile.html" class="active">Profile</a>
      <a href="#" id="logoutBtn" class="logout-btn">Logout</a>
    </nav>
  </header>

  <main class="profile-container">
    <section class="profile-card">
      <div class="profile-header">
        <div class="avatar" id="avatar">U</div>
        <div>
          <h1 id="profile-name">User Profile</h1>
          <p id="profile-email">user@fittracker.com</p>
        </div>
      </div>

      <form id="profile-form" class="profile-form">
        <div class="form-grid">
          <div>
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name">
          </div>

          <div>
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">
          </div>

          <div>
            <label for="age">Age</label>
            <input type="number" id="age" placeholder="Enter your age">
          </div>

          <div>
            <label for="gender">Gender</label>
            <select id="gender">
              <option value="">Select gender</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>

          <div>
            <label for="height">Height (cm)</label>
            <input type="number" id="height" placeholder="Enter your height">
          </div>

          <div>
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" placeholder="Enter your weight">
          </div>

          <div>
            <label for="goal">Fitness Goal</label>
            <select id="goal">
              <option value="">Select goal</option>
              <option>Lose Weight</option>
              <option>Maintain Fitness</option>
              <option>Gain Muscle</option>
              <option>Improve Endurance</option>
            </select>
          </div>

          <div>
            <label for="activity">Activity Level</label>
            <select id="activity">
              <option value="">Select activity level</option>
              <option>Beginner</option>
              <option>Moderate</option>
              <option>Active</option>
            </select>
          </div>
        </div>

        <button type="submit">Save Profile</button>
        <p id="success-message" class="success-message"></p>
      </form>
    </section>
  </main>

  <script>
    function getProfile() {
      return JSON.parse(localStorage.getItem("ft_profile")) || {
        fullName: localStorage.getItem("ft_user") || "User",
        email: "user@fittracker.com",
        age: "",
        gender: "",
        height: "",
        weight: "",
        goal: "",
        activity: ""
      };
    }

    function saveProfile(profile) {
      localStorage.setItem("ft_profile", JSON.stringify(profile));
      localStorage.setItem("ft_user", profile.fullName);
    }

    function loadProfile() {
      const profile = getProfile();

      document.getElementById("profile-name").textContent = profile.fullName || "User Profile";
      document.getElementById("profile-email").textContent = profile.email || "user@fittracker.com";
      document.getElementById("avatar").textContent = (profile.fullName || "U").charAt(0).toUpperCase();

      document.getElementById("fullName").value = profile.fullName || "";
      document.getElementById("email").value = profile.email || "";
      document.getElementById("age").value = profile.age || "";
      document.getElementById("gender").value = profile.gender || "";
      document.getElementById("height").value = profile.height || "";
      document.getElementById("weight").value = profile.weight || "";
      document.getElementById("goal").value = profile.goal || "";
      document.getElementById("activity").value = profile.activity || "";
    }

    document.getElementById("profile-form").addEventListener("submit", function(e) {
      e.preventDefault();

      const profile = {
        fullName: document.getElementById("fullName").value.trim(),
        email: document.getElementById("email").value.trim(),
        age: document.getElementById("age").value.trim(),
        gender: document.getElementById("gender").value,
        height: document.getElementById("height").value.trim(),
        weight: document.getElementById("weight").value.trim(),
        goal: document.getElementById("goal").value,
        activity: document.getElementById("activity").value
      };

      saveProfile(profile);
      loadProfile();

      document.getElementById("success-message").textContent = "Profile saved successfully!";
    });

    document.getElementById("logoutBtn").addEventListener("click", function(e) {
      e.preventDefault();
      localStorage.removeItem("ft_token");
      localStorage.removeItem("ft_user");
      window.location.href = "index.html";
    });

    loadProfile();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTracker</title>
  <link rel="stylesheet" href="admin.dashboard.css" />
</head>

<body>

<header class="navbar">
  <div class="brand">
    <div class="logo">
      <img src="assets/fittracker-logo.png" alt="Logo">
    </div>
    <span>FitTracker</span>
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#">Profile</a>
    <a href="#">Nutrition</a>
    <a href="#">Workout</a>
    <a href="#">Dashboard</a>
   <a href="admin.login.html" onclick="logoutAdmin()" class="logout-btn">Log Out</a>
  </nav>

  <div class="admin-profile" id="adminName">👤 Admin</div>
</header>

<main class="dashboard">

  <div class="top-row">
    <input 
      type="text" 
      id="searchInput" 
      class="search-box" 
      placeholder="Search users 🔍"
      onkeyup="searchUsers()"
    />
    <h1>Dashboard Overview</h1>
  </div>

  <section class="cards">
    <div class="card">
      <p>Total Users</p>
      <h2 id="totalUsers">0</h2>
    </div>

    <div class="card">
      <p>Active Users</p>
      <h2 id="activeUsers">0</h2>
    </div>

    <div class="card">
      <p>Total Workouts</p>
      <h2 id="totalWorkouts">0</h2>
    </div>

    <div class="card">
      <p>Total Plans</p>
      <h2 id="totalPlans">0</h2>
    </div>
  </section>

  <h2 class="title">Recent Users</h2>

  <section class="table-box">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Joined On</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="userTable"></tbody>
    </table>
  </section>

  <h2 class="title">Quick Actions</h2>

  <section class="actions">
    <div class="action-row">
      <button type="button" onclick="openAddUserModal()">Add New Users</button>
      <span>+</span>
    </div>

    <div class="action-row">
      <button type="button" onclick="openNutritionModal()">Add Nutrition Item</button>
      <span>+</span>
    </div>

    <div class="action-row">
      <button type="button" onclick="openWorkoutModal()">Add New Workouts</button>
      <span>+</span>
    </div>

    <div class="action-row">
      <button type="button" onclick="openReportsModal()">View Reports</button>
      <span>+</span>
    </div>

    <div class="action-row">
      <button type="button" onclick="openDeleteWorkoutModal()">Delete Workout</button>
      <span>-</span>
    </div>

    <div class="action-row">
      <button type="button" onclick="openDeleteNutritionModal()">Delete Nutrition</button>
      <span>-</span>
    </div>
  </section>

  <div class="bottom">
    <p>2026 FitTracker Admin Panel</p>
  </div>

</main>

<!-- WHITE MODAL POPUP -->
<div id="customModal" class="modal-overlay">
  <div class="modal-box">

    <div class="modal-header">
      <h2 id="modalTitle">Add</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

    <div class="modal-body" id="modalBody"></div>

    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-submit" onclick="submitModal()">Add</button>
    </div>

  </div>
</div>

<script>
let allUsers = [];
let modalType = '';

// ─── Auth guard ────────────────────────────────────────────────────
async function checkAdminSession() {
  try {
    const res  = await fetch('/api/admin/stats');
    if (res.status === 403 || res.status === 401) {
      window.location.href = 'admin.login.html';
    }
  } catch (e) {
    console.error('Admin session check failed', e);
  }
}

function logoutAdmin() {
  fetch('/admin-logout', { method: 'POST' })
    .finally(() => {
      localStorage.removeItem('adminName');
      window.location.href = 'admin.login.html';
    });
}

// ─── Display users ─────────────────────────────────────────────────
function displayUsers(users) {
  const tbody = document.getElementById('userTable');
  if (!users || users.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#888;">No users found.</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(user => {
    const joined = user.created_at
      ? new Date(user.created_at).toLocaleDateString('en-GB')
      : '—';
    return `
      <tr>
        <td>${user.id}</td>
        <td>${user.name || '—'}</td>
        <td>${user.email}</td>
        <td>${joined}</td>
        <td>${user.goal || '—'}</td>
        <td><button class="delete-btn" onclick="confirmDeleteUser(${user.id})">Delete</button></td>
      </tr>`;
  }).join('');
}

// ─── Load users ────────────────────────────────────────────────────
async function loadUsers() {
  try {
    const res  = await fetch('/api/admin/users');
    const data = await res.json();
    if (!data.success) { console.error('Failed to load users:', data.message); return; }
    allUsers = data.users;
    displayUsers(allUsers);
  } catch (e) {
    console.error('loadUsers error:', e);
  }
}

// ─── Load stats ────────────────────────────────────────────────────
async function loadStats() {
  try {
    const res  = await fetch('/api/admin/stats');
    const data = await res.json();
    if (!data.success) return;
    const s = data.stats;
    document.getElementById('totalUsers').innerText    = s.totalUsers    ?? 0;
    document.getElementById('activeUsers').innerText   = s.totalUsers    ?? 0;
    document.getElementById('totalWorkouts').innerText = s.totalWorkouts ?? 0;
    document.getElementById('totalPlans').innerText    = s.totalSubscriptions ?? 0;
  } catch (e) {
    console.error('loadStats error:', e);
  }
}

// ─── Search ────────────────────────────────────────────────────────
function searchUsers() {
  const kw = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allUsers.filter(u =>
    (u.name  || '').toLowerCase().includes(kw) ||
    (u.email || '').toLowerCase().includes(kw) ||
    (u.goal  || '').toLowerCase().includes(kw)
  );
  displayUsers(filtered);
}

// ─── Modal helpers ─────────────────────────────────────────────────
function openModal(title, bodyHtml, buttonText, type) {
  modalType = type;
  document.getElementById('modalTitle').innerText           = title;
  document.getElementById('modalBody').innerHTML            = bodyHtml;
  document.querySelector('.modal-submit').innerText         = buttonText;
  document.getElementById('customModal').style.display      = 'flex';
}

function closeModal() {
  document.getElementById('customModal').style.display = 'none';
}

// ─── Quick action modals ───────────────────────────────────────────
function openAddUserModal() {
  openModal('Add New User',
    `<label>Name</label>
     <input id="modalName" type="text" placeholder="e.g. John Smith">
     <label>Email</label>
     <input id="modalEmail" type="email" placeholder="e.g. john@email.com">
     <label>Password</label>
     <input id="modalPass" type="password" placeholder="Min. 6 characters">`,
    'Add', 'addUser');
}

function openWorkoutModal() {
  openModal('Feature Unavailable',
    '<p class="report-message">Adding workouts via admin panel is not yet supported.</p>',
    'Close', 'info');
}

function openNutritionModal() {
  openModal('Feature Unavailable',
    '<p class="report-message">Adding nutrition items via admin panel is not yet supported.</p>',
    'Close', 'info');
}

function openDeleteWorkoutModal() {
  openModal('Feature Unavailable',
    '<p class="report-message">Deleting workouts via admin panel is not yet supported.</p>',
    'Close', 'info');
}

function openDeleteNutritionModal() {
  openModal('Feature Unavailable',
    '<p class="report-message">Deleting nutrition items via admin panel is not yet supported.</p>',
    'Close', 'info');
}

function openReportsModal() {
  openModal('Reports',
    '<p class="report-message">Reports feature coming soon.</p>',
    'Done', 'info');
}

// ─── Delete user ───────────────────────────────────────────────────
function confirmDeleteUser(id) {
  openModal('Delete User',
    `<p class="report-message">Are you sure you want to delete this user? This cannot be undone.</p>
     <input id="deleteUserId" type="hidden" value="${id}">`,
    'Delete', 'deleteUser');
}

// ─── Submit modal ──────────────────────────────────────────────────
async function submitModal() {
  if (modalType === 'info' || modalType === 'reports') {
    closeModal();
    return;
  }

  if (modalType === 'addUser') {
    const name  = document.getElementById('modalName').value.trim();
    const email = document.getElementById('modalEmail').value.trim();
    const pass  = document.getElementById('modalPass').value;

    if (!name || !email || !pass) { alert('Please fill all fields.'); return; }
    if (pass.length < 6) { alert('Password must be at least 6 characters.'); return; }

    try {
      const res  = await fetch('/register', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ name, email, password: pass })
      });
      const data = await res.json();
      alert(data.message || (data.success ? 'User added.' : 'Failed to add user.'));
      if (data.success) { loadUsers(); loadStats(); }
    } catch (e) {
      alert('Error adding user.');
    }
    closeModal();
    return;
  }

  if (modalType === 'deleteUser') {
    const id = document.getElementById('deleteUserId').value;
    try {
      const res  = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
      const data = await res.json();
      alert(data.message || 'User deleted.');
      loadUsers();
      loadStats();
    } catch (e) {
      alert('Error deleting user.');
    }
    closeModal();
    return;
  }

  closeModal();
}

// ─── Init ──────────────────────────────────────────────────────────
function showAdminName() {
  const name = localStorage.getItem('adminName');
  if (name) document.getElementById('adminName').innerText = '👤 ' + name;
}

checkAdminSession();
showAdminName();
loadUsers();
loadStats();
</script>

</body>
</html>

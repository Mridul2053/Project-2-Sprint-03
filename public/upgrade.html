<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Upgrade to Premium &middot; FitTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body { font-family: 'Nunito', sans-serif; background: #f5f6fa; margin: 0; padding: 40px 20px; }
  .upgrade-card { max-width: 460px; margin: 40px auto; background: #fff; border-radius: 16px;
                  padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  .upgrade-card h1 { margin: 0 0 8px; font-size: 28px; }
  .upgrade-card .sub { color: #666; margin: 0 0 24px; }
  .features { list-style: none; padding: 0; margin: 0 0 24px; }
  .features li { padding: 8px 0; border-bottom: 1px solid #eee; }
  .features li:before { content: "✓ "; color: #28a745; font-weight: 700; }
  .price { font-size: 32px; font-weight: 800; margin: 16px 0 4px; }
  .price small { font-size: 14px; color: #888; font-weight: 400; }
  #paypal-button-container { margin-top: 16px; min-height: 60px; }
  #status { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; }
  #status.ok    { display: block; background: #d4edda; color: #155724; }
  #status.err   { display: block; background: #f8d7da; color: #721c24; }
  #status.info  { display: block; background: #e2e3f0; color: #383d75; }
  .back { display: inline-block; margin-top: 16px; color: #555; text-decoration: none; }
  .premium-banner { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px;
                    margin-bottom: 16px; text-align: center; font-weight: 700; }
  button.cancel-btn { background: transparent; border: 1px solid #dc3545; color: #dc3545;
                      padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600;
                      margin-top: 12px; }
</style>
</head>
<body>

<div class="upgrade-card">
  <h1>FitTracker Premium</h1>
  <p class="sub">Unlock the full experience.</p>

  <div id="already-premium" style="display:none">
    <div class="premium-banner">✨ You're a Premium member</div>
    <p id="next-billing" style="color:#666;font-size:14px"></p>
    <button class="cancel-btn" onclick="cancelSubscription()">Cancel subscription</button>
  </div>

  <div id="upgrade-flow">
    <ul class="features">
      <li>Advanced workout analytics</li>
      <li>Unlimited custom meal plans</li>
      <li>Export your data anytime</li>
      <li>Priority support</li>
    </ul>
    <div class="price">$9.99<small> / month</small></div>
    <div id="paypal-button-container"></div>
  </div>

  <div id="status"></div>
  <a class="back" href="/">&larr; Back to app</a>
</div>

<script>
// Pull the user from localStorage (set on login by the existing app).
const session = JSON.parse(localStorage.getItem('ft_session') || 'null');
const userId  = session && session.userId;

function showStatus(msg, kind) {
  const el = document.getElementById('status');
  el.className = kind;
  el.textContent = msg;
}

async function init() {
  if (!userId) {
    showStatus('Please log in first.', 'err');
    document.getElementById('upgrade-flow').style.display = 'none';
    return;
  }

  // Check current subscription state. credentials:'same-origin' sends the cookie.
  const subRes = await fetch(`/api/subscription/${userId}`, { credentials: 'same-origin' });
  if (subRes.status === 401) {
    showStatus('Your session has expired. Please log in again.', 'err');
    document.getElementById('upgrade-flow').style.display = 'none';
    return;
  }
  const subData = await subRes.json();
  if (subData.is_premium) {
    document.getElementById('already-premium').style.display = 'block';
    document.getElementById('upgrade-flow').style.display = 'none';
    if (subData.subscription?.next_billing_time) {
      document.getElementById('next-billing').textContent =
        'Next billing: ' + new Date(subData.subscription.next_billing_time).toLocaleDateString();
    }
    return;
  }

  // Load PayPal config and render the Smart Button.
  const cfgRes = await fetch('/api/subscription/config');
  const cfg = await cfgRes.json();
  if (!cfg.clientId || !cfg.planId) {
    showStatus('Payments are not configured. Contact support.', 'err');
    return;
  }

  const sdk = document.createElement('script');
  sdk.src = `https://www.paypal.com/sdk/js?client-id=${encodeURIComponent(cfg.clientId)}&vault=true&intent=subscription`;
  sdk.onload = renderButton.bind(null, cfg.planId);
  sdk.onerror = () => showStatus('Could not load PayPal. Check your connection.', 'err');
  document.head.appendChild(sdk);
}

function renderButton(planId) {
  paypal.Buttons({
    style: { shape: 'pill', color: 'gold', layout: 'vertical', label: 'subscribe' },
    createSubscription: (_, actions) => actions.subscription.create({ plan_id: planId }),
    onApprove: async (data) => {
      showStatus('Verifying your subscription…', 'info');
      const res = await fetch('/api/subscription/activate', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        // user_id is NOT sent — the server gets it from the session cookie.
        body: JSON.stringify({ subscription_id: data.subscriptionID })
      });
      const out = await res.json();
      if (out.status === 'ok') {
        showStatus('Welcome to Premium! 🎉', 'ok');
        setTimeout(() => location.reload(), 1500);
      } else {
        showStatus(out.message || 'Something went wrong verifying your subscription.', 'err');
      }
    },
    onError: (err) => {
      console.error(err);
      showStatus('PayPal error — please try again.', 'err');
    }
  }).render('#paypal-button-container');
}

async function cancelSubscription() {
  if (!confirm('Cancel your Premium subscription? You\'ll keep access until the end of the current billing period.')) return;
  const res = await fetch(`/api/subscription/${userId}/cancel`, {
    method: 'POST',
    credentials: 'same-origin'
  });
  const out = await res.json();
  if (out.status === 'ok') {
    showStatus('Subscription cancelled.', 'ok');
    setTimeout(() => location.reload(), 1200);
  } else {
    showStatus(out.message || 'Could not cancel.', 'err');
  }
}

init();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTracker Admin Login</title>
  <link rel="stylesheet" href="admin.login.css">
</head>
<body>

<header class="navbar">
  <div class="brand">
    <div class="logo">FT</div>
    <span>FitTracker Admin</span>
  </div>

  <nav>
    <a href="dashboard.html">User Dashboard</a>
    <a href="workoutplan.html">Workout Plans</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="admin-profile">
    👤 <span id="adminName">Admin</span>
  </div>
</header>

<main class="login-layout">

  <!-- LEFT SIDE -->
  <section class="left-section">
    <h2 class="tagline">Manage, Monitor, Motivate</h2>

    <h3>Admin Access</h3>
    <p>User Management</p>
    <p>Workout Plans</p>
    <p>Track Progress</p>
    <p>View Reports</p>
  </section>

  <!-- RIGHT SIDE -->
  <section class="login-card">
    <h1>Admin Login</h1>
    <p class="subtitle">Sign in to the admin panel</p>

    <p id="error-msg" style="color:#c00;font-size:14px;margin-bottom:10px;display:none;"></p>

    <label>Email Address</label>
    <input type="email" id="email" placeholder="admin@fittracker.com">

    <label>Password</label>
    <div class="password-box">
      <input type="password" id="password" placeholder="Enter your password">
      <span onclick="togglePassword()">👁️</span>
    </div>

    <button id="loginBtn" onclick="loginAdmin()">Login</button>
  </section>

</main>

<footer>2026 FitTracker Admin Panel</footer>

<script>
async function loginAdmin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('error-msg');
  const btn      = document.getElementById('loginBtn');

  errEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent   = 'Please enter email and password.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Logging in…';

  try {
    const res  = await fetch('/admin-login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!data.success) {
      errEl.textContent   = data.message || 'Invalid admin credentials.';
      errEl.style.display = 'block';
      return;
    }

    localStorage.setItem('adminName', email.split('@')[0]);
    window.location.href = 'admin.dashboard.html';

  } catch (e) {
    errEl.textContent   = 'Connection error. Make sure the server is running.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Login';
  }
}

function togglePassword() {
  const pass = document.getElementById('password');
  pass.type = pass.type === 'password' ? 'text' : 'password';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loginAdmin();
});
</script>

</body>
</html>

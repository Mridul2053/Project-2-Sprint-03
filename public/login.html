<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FitTracker — Login</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <div class="card">
      <img src="assets/logo.png" class="logo logo-lg" alt="Fitness Tracker Logo">
      <h1>Welcome Back</h1>
      <p class="subtitle">Track your fitness. Reach your goals.</p>

      <form id="login-form" class="form" novalidate>
        <input id="email" type="email" placeholder="Email" required>

        <div class="password-wrap">
          <input id="password" type="password" placeholder="Password" required>
          <button type="button" class="toggle-password" onclick="togglePassword()">Show</button>
        </div>

        <button id="login-btn" type="submit">Log in</button>

        <p class="hint">Demo: <code>demo@fittracker.app</code> / <code>Passw0rd!</code></p>
        <p id="error" class="error" hidden></p>

        <p class="signup-text">
          Don’t have an account?
          <a href="signup.html">Sign Up</a>
        </p>
      </form>
    </div>
  </main>

  <footer class="footer">
    <h3>FedUni</h3>
    <p>470 Bourke Street · Melbourne 3000 · 1800 333 864 · <a href="mailto:info@feduni.com.au">info@feduni.com.au</a></p>
  </footer>

  <script src="app.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const error    = document.getElementById("error");
      const btn      = document.getElementById("login-btn");

      error.hidden = true;
      error.textContent = "";

      if (!email || !password) {
        error.textContent = "Please enter your email and password.";
        error.hidden = false;
        return;
      }

      btn.disabled = true;
      btn.textContent = "Logging in…";

      try {
        // Call the server — this creates the session so Workout.html works
        const res  = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!data.success) {
          error.textContent = data.message || "Invalid email or password.";
          error.hidden = false;
          return;
        }

        // Set localStorage so dashboard/tracker/home pages also work
        localStorage.setItem("ft_token", "logged_in");
        localStorage.setItem("ft_user",  data.user.name || data.user.email);
        localStorage.setItem("ft_loggedInEmail", data.user.email);

        // Also sync with any localStorage account that matches
        try {
          const accounts = JSON.parse(localStorage.getItem("fittrackerAccounts") || "[]");
          const match    = accounts.find(a => a.email === data.user.email);
          if (match) {
            if (match.profile)   localStorage.setItem("ft_profile",   JSON.stringify(match.profile));
            if (match.goals)     localStorage.setItem("ft_goals",     JSON.stringify(match.goals));
            if (match.dashboard) localStorage.setItem("ft_dashboard", JSON.stringify(match.dashboard));
          }
        } catch {}

        window.location.href = "home.html";

      } catch {
        error.textContent = "Connection error. Make sure the server is running.";
        error.hidden = false;
      } finally {
        btn.disabled = false;
        btn.textContent = "Log in";
      }
    });

    function togglePassword() {
      const passwordInput = document.getElementById("password");
      const button = document.querySelector(".toggle-password");

      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        button.textContent = "Hide";
      } else {
        passwordInput.type = "password";
        button.textContent = "Show";
      }
    }
  </script>
</body>
</html>
